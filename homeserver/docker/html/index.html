<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome — CloudAtHome</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 80px auto; padding: 0 1rem; color: #222; }
    h1   { font-size: 2rem; margin-bottom: 0.25rem; }
    p    { line-height: 1.6; color: #444; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>It works.</h1>
  <p>
    This page is being served from a <strong>home network</strong> through a
    secure SSH reverse tunnel via <code>CloudAtHome</code>.
  </p>
  <p>
    Traffic arrived at the cloud proxy, was routed by SNI hostname through the
    tunnel, and SSL was terminated here by nginx on the home side.
  </p>
</body>
</html>
