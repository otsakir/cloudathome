services:
  haproxy:
    build:
      context: .
      dockerfile: haproxy.dockerfile
    volumes:
      - ./docker/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "80:80"
      - "443:443"
      - "10000-10099:10000-10099"
    user: haproxy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9999 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  tunnelagent:
    build:
      context: .
      dockerfile: django.dockerfile
    depends_on:
      haproxy:
        condition: service_healthy
    ports:
      - "8022:22"
      - "8000:8000"
    cap_add:
      - NET_ADMIN
    volumes:
      - sqlite-data:/opt/backend-var

volumes:
  sqlite-data:
