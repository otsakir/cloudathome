services:
  haproxy:
    build:
      context: .
      dockerfile: haproxy.dockerfile
    volumes:
      - ./docker/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "80:80"
      - "443:443"
      - "10000-10099:10000-10099"
    user: haproxy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9999 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s

    extra_hosts:
      - "host.docker.internal:host-gateway"  # map host machine to this container to allow accessing http://localhost:8443 now under http://host.docker.internal:8443

  tunnelagent:
    build:
      context: .
      dockerfile: django.dockerfile
    depends_on:
      haproxy:
        condition: service_healthy
    ports:
      - 8022:22
      - 8000:8000
    environment:
      DJANGO_SETTINGS_MODULE: cloudserver.settings.docker_settings
    cap_add:
      - NET_ADMIN
    volumes:
      - ./src:/opt/app
      - ./src/var:/opt/backend-var

