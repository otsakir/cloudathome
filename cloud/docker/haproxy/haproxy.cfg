global
  maxconn 4096
  stats socket ipv4@0.0.0.0:9999 level admin
  log stdout format raw local0

resolvers docker
  nameserver dns1 127.0.0.11:53
  resolve_retries 3
  timeout resolve 1s
  timeout retry 1s
  hold valid 10s
  hold obsolete 0s

defaults
  mode tcp
  timeout connect 5000ms
  timeout client 50000ms
  timeout server 50000ms
  option tcplog
  log global
  default-server init-addr none resolvers docker resolve-prefer ipv4

frontend https_frontend
  bind *:443
  tcp-request inspect-delay 5s
  tcp-request content accept if { req_ssl_hello_type 1 }
  use_backend %[req_ssl_sni,lower,map(/usr/local/etc/haproxy/maps/sni_backends.map)]
  default_backend default_backend

backend default_backend
  server home host.docker.internal:8443

frontend tcp_public
  bind *:10000-10099
  mode tcp
  use_backend %[dst_port,map_int(/usr/local/etc/haproxy/maps/tcp_backends.map)]
  default_backend tcp_no_match

backend tcp_no_match

frontend http_frontend
  bind *:80
  mode http
  use_backend %[req.hdr(host),lower,map(/usr/local/etc/haproxy/maps/host_http_backends.map)]
  default_backend http_default_backend

backend http_default_backend
  mode http

# Cloud admin backend — receives raw TLS from the SNI frontend;
# gunicorn handles TLS termination with the cloud domain certificate.
backend tunnelagent_django
  server django tunnelagent:8000

