<!DOCTYPE html>
<html>
<head><title>Add domain</title></head>
<body>
<h1>Add domain</h1>
<p><a href="{% url 'domain_list' %}">Back to domains</a></p>

{% if form.non_field_errors %}
  <ul>{% for e in form.non_field_errors %}<li>{{ e }}</li>{% endfor %}</ul>
{% endif %}

<form method="post">
  {% csrf_token %}
  <table>{{ form.as_table }}</table>
  <button type="submit">Add domain</button>
</form>
</body>
</html>
