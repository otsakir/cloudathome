services:
  haproxy:
    build:
      context: .
      dockerfile: haproxy.dockerfile
    volumes:
      - ./docker/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - haproxy_maps:/usr/local/etc/haproxy/maps
    ports:
      - "443:443"
    user: haproxy

    extra_hosts:
      - "host.docker.internal:host-gateway"  # map host machine to this container to allow accessing http://localhost:8443 now under http://host.docker.internal:8443

  tunnelagent:
    build:
      context: .
      dockerfile: tunnelagent.dockerfile
    ports:
      - 8022:22
      - 8000:8000
    environment:
      DJANGO_SETTINGS_MODULE: backend.settings.docker_settings
    volumes:
      - ./tunnelagent/backend:/opt/app

#  proxyagent:
#    build:
